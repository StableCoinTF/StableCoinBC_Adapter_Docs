asyncapi: 3.0.0
info:
  title: StableCoin BC Adapter
  version: 1.0.0
  description: |
    StableCoin 블록체인 어댑터의 Kafka 메시지 스펙.
    계정 생성/배포, 출금, 결제, 정산, 잔액 조회, 대사, 입금 감지 등의 블록체인 연동 기능을 제공합니다.

defaultContentType: application/json

channels:
  accountCreate:
    $ref: './channels.yaml#/accountCreate'
  accountCreated:
    $ref: './channels.yaml#/accountCreated'
  accountDeploy:
    $ref: './channels.yaml#/accountDeploy'
  accountDeployed:
    $ref: './channels.yaml#/accountDeployed'
  accountDelete:
    $ref: './channels.yaml#/accountDelete'
  withdrawRequest:
    $ref: './channels.yaml#/withdrawRequest'
  withdrawResult:
    $ref: './channels.yaml#/withdrawResult'
  paymentRequest:
    $ref: './channels.yaml#/paymentRequest'
  paymentResult:
    $ref: './channels.yaml#/paymentResult'
  commonConfirm:
    $ref: './channels.yaml#/commonConfirm'
  commonConfirmed:
    $ref: './channels.yaml#/commonConfirmed'
  balanceInquiry:
    $ref: './channels.yaml#/balanceInquiry'
  balanceResult:
    $ref: './channels.yaml#/balanceResult'
  configCreate:
    $ref: './channels.yaml#/configCreate'
  settlementRequest:
    $ref: './channels.yaml#/settlementRequest'
  settlementResult:
    $ref: './channels.yaml#/settlementResult'
  reconciliationInquiry:
    $ref: './channels.yaml#/reconciliationInquiry'
  reconciliationResult:
    $ref: './channels.yaml#/reconciliationResult'
  depositDetected:
    $ref: './channels.yaml#/depositDetected'

operations:
  receiveAccountCreate:
    action: receive
    channel:
      $ref: "#/channels/accountCreate"
    title: 계정 생성 요청 수신
    summary: 계정 생성 요청 수신
    reply:
      channel:
        $ref: "#/channels/accountCreated"

  sendAccountCreated:
    action: send
    channel:
      $ref: "#/channels/accountCreated"
    title: 계정 생성 결과 발행
    summary: 계정 생성 결과 발행

  receiveAccountDeploy:
    action: receive
    channel:
      $ref: "#/channels/accountDeploy"
    title: 계정 배포 요청 수신
    summary: 계정 배포 요청 수신
    reply:
      channel:
        $ref: "#/channels/accountDeployed"

  sendAccountDeployed:
    action: send
    channel:
      $ref: "#/channels/accountDeployed"
    title: 계정 배포 결과 발행
    summary: 계정 배포 결과 발행

  receiveAccountDelete:
    action: receive
    channel:
      $ref: "#/channels/accountDelete"
    title: 계정 삭제 요청 수신
    summary: 계정 삭제 요청 수신 (응답 없음)

  receiveWithdrawRequest:
    action: receive
    channel:
      $ref: "#/channels/withdrawRequest"
    title: 출금 요청 수신
    summary: 출금 요청 수신
    reply:
      channel:
        $ref: "#/channels/withdrawResult"

  sendWithdrawResult:
    action: send
    channel:
      $ref: "#/channels/withdrawResult"
    title: 출금 결과 발행
    summary: 출금 결과 발행

  receivePaymentRequest:
    action: receive
    channel:
      $ref: "#/channels/paymentRequest"
    title: 결제 요청 수신
    summary: 결제 요청 수신
    reply:
      channel:
        $ref: "#/channels/paymentResult"

  sendPaymentResult:
    action: send
    channel:
      $ref: "#/channels/paymentResult"
    title: 결제 결과 발행
    summary: 결제 결과 발행

  receiveConfirm:
    action: receive
    channel:
      $ref: "#/channels/commonConfirm"
    title: 트랜잭션 컨펌 요청 수신
    summary: 트랜잭션 컨펌 요청 수신
    reply:
      channel:
        $ref: "#/channels/commonConfirmed"

  sendConfirmed:
    action: send
    channel:
      $ref: "#/channels/commonConfirmed"
    title: 트랜잭션 컨펌 결과 발행
    summary: 트랜잭션 컨펌 결과 발행

  receiveBalanceInquiry:
    action: receive
    channel:
      $ref: "#/channels/balanceInquiry"
    title: 잔액 조회 요청 수신
    summary: 잔액 조회 요청 수신
    reply:
      channel:
        $ref: "#/channels/balanceResult"

  sendBalanceResult:
    action: send
    channel:
      $ref: "#/channels/balanceResult"
    title: 잔액 조회 결과 발행
    summary: 잔액 조회 결과 발행

  receiveSettlementRequest:
    action: receive
    channel:
      $ref: "#/channels/settlementRequest"
    title: 정산 요청 수신
    summary: 정산 요청 수신
    reply:
      channel:
        $ref: "#/channels/settlementResult"

  sendSettlementResult:
    action: send
    channel:
      $ref: "#/channels/settlementResult"
    title: 정산 결과 발행
    summary: 정산 결과 발행

  receiveReconciliationInquiry:
    action: receive
    channel:
      $ref: "#/channels/reconciliationInquiry"
    title: 대사 조회 요청 수신
    summary: 대사 조회 요청 수신
    reply:
      channel:
        $ref: "#/channels/reconciliationResult"

  sendReconciliationResult:
    action: send
    channel:
      $ref: "#/channels/reconciliationResult"
    title: 대사 조회 결과 발행
    summary: 대사 조회 결과 발행

  receiveConfigCreate:
    action: receive
    channel:
      $ref: "#/channels/configCreate"
    title: 설정 등록 요청 수신
    summary: 설정 등록 요청 수신 (응답 없음)

  sendDepositDetected:
    action: send
    channel:
      $ref: "#/channels/depositDetected"
    title: 입금 감지 이벤트 발행
    summary: 입금 감지 이벤트 발행 (WebSocket → Kafka)

components:
  schemas:
    TransactionStatus:
      title: 트랜잭션 상태
      type: string
      enum:
        - TXPD
        - TXCF
        - TXFA
      description: |
        트랜잭션 상태:
        - TXPD: Pending (제출됨, 컨펌 대기 중)
        - TXCF: Confirmed (블록 컨펌 완료)
        - TXFA: Failed (트랜잭션 실패)

# ═════════════════════════════════════════════════════════════
#   새 토픽 추가 가이드
# ═════════════════════════════════════════════════════════════
#
# [1단계] channels.yaml에 채널 + 메시지 인라인 추가:
#
#   newTopicRequest:
#     address: adapter.new.topic
#     description: 새 토픽 설명 (방향)
#     messages:
#       NewTopicRequest:
#         name: NewTopicRequest
#         title: 새 토픽 요청
#         payload:
#           type: object
#           required: [requestId, myField]
#           properties:
#             requestId:
#               type: string
#               description: 요청 고유 ID
#               examples: ["REQ-001"]
#             myField:
#               type: string
#               description: 필드 설명
#               examples: ["example-value"]
#         examples:
#           - name: 요청 예시
#             payload:
#               requestId: "REQ-001"
#               myField: "example-value"
#
# [2단계] 이 파일의 channels 섹션에 $ref 추가:
#
#   newTopicRequest:
#     $ref: './channels.yaml#/newTopicRequest'
#
# [3단계] operations 섹션에 추가:
#
#   receiveNewTopic:
#     action: receive            # receive = Inbound, send = Outbound
#     channel:
#       $ref: "#/channels/newTopicRequest"
#     summary: 새 토픽 요청 수신
#     reply:                     # 응답 없으면(NoReply) reply 블록 삭제
#       channel:
#         $ref: "#/channels/newTopicResult"
#
# [4단계] asyncapi.yaml 수정 후 main에 push → GitHub Actions 자동 배포
