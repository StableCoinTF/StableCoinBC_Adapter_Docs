asyncapi: 3.0.0
info:
  title: StableCoin BC Adapter
  version: 1.0.0
  description: |
    StableCoin 블록체인 어댑터의 Kafka 메시지 스펙.
    계정 생성/배포, 출금, 결제, 정산, 잔액 조회, 대사, 입금 감지 등의 블록체인 연동 기능을 제공합니다.

defaultContentType: application/json

channels:
  accountCreate:
    address: adapter.account.create
    title: 계정 생성 요청
    description: Core → Adapter
    messages:
      AccountCreateRequest:
        name: AccountCreateRequest
        title: 계정 생성 요청
        payload:
          type: object
          required:
            - requestId
            - networkType
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "U123456789"
            networkType:
              type: string
              description: "네트워크 타입 (예: EVM)"
              examples:
                - "EVM"
        examples:
          - name: 계정 생성 요청 예시
            payload:
              requestId: "U123456789"
              networkType: "EVM"

  accountCreated:
    address: adapter.account.created
    title: 계정 생성 결과
    description: Adapter → Core
    messages:
      AccountCreateResponse:
        name: AccountCreateResponse
        title: 계정 생성 결과
        payload:
          type: object
          required:
            - requestId
            - address
            - networkType
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "U123456789"
            address:
              type: string
              description: 생성된 Smart Account 주소 (실패 시 null)
              pattern: "^0x[a-fA-F0-9]{40}$"
              nullable: true
              examples:
                - "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
            networkType:
              type: string
              description: 네트워크 타입 (실패 시 null)
              nullable: true
              examples:
                - "EVM"
            message:
              type: string
              description: 에러 메시지 (성공 시 빈 문자열)
              nullable: true
              examples:
                - ""
        examples:
          - name: 계정 생성 성공
            payload:
              requestId: "U123456789"
              address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
              networkType: "EVM"
              message: ""
          - name: 계정 생성 실패
            payload:
              requestId: "U123456789"
              address: null
              networkType: null
              message: "UNSUPPORTED_NETWORK_TYPE"

  accountDeploy:
    address: adapter.account.deploy
    title: 계정 배포 요청
    description: Core → Adapter
    messages:
      AccountDeployRequest:
        name: AccountDeployRequest
        title: 계정 배포 요청
        payload:
          type: object
          required:
            - requestId
            - chainId
            - address
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "U123456789"
            chainId:
              type: string
              description: "체인 ID (예: 11155111 = Sepolia)"
              examples:
                - "11155111"
            address:
              type: string
              description: 배포할 Smart Account 주소
              pattern: "^0x[a-fA-F0-9]{40}$"
              examples:
                - "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
        examples:
          - name: 계정 배포 요청 예시
            payload:
              requestId: "U123456789"
              chainId: "11155111"
              address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"

  accountDeployed:
    address: adapter.account.deployed
    title: 계정 배포 결과
    description: Adapter → Core
    messages:
      AccountDeployResponse:
        name: AccountDeployResponse
        title: 계정 배포 결과
        payload:
          type: object
          required:
            - requestId
            - status
            - txHash
            - completeDatetime
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "U123456789"
            status:
              $ref: "#/components/schemas/TransactionStatus"
            txHash:
              type: string
              description: 트랜잭션 해시 (Pending 시 null)
              pattern: "^0x[a-fA-F0-9]{64}$"
              nullable: true
              examples:
                - "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
            completeDatetime:
              type: string
              description: 완료 일시 (yyyyMMddHHmmss, Pending 시 null)
              nullable: true
              examples:
                - "20260325143015"
            message:
              type: string
              description: 에러 메시지 (성공 시 빈 문자열)
              nullable: true
              examples:
                - ""
        examples:
          - name: 배포 Pending
            payload:
              requestId: "U123456789"
              status: "TXPD"
              txHash: null
              completeDatetime: null
              message: ""
          - name: 배포 Confirmed
            payload:
              requestId: "U123456789"
              status: "TXCF"
              txHash: "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
              completeDatetime: "20260325143015"
              message: ""

  accountDelete:
    address: adapter.account.delete
    title: 계정 삭제 요청
    description: Core → Adapter (응답 없음)
    messages:
      AccountDeleteRequest:
        name: AccountDeleteRequest
        title: 계정 삭제 요청 (NoReply)
        payload:
          type: object
          required:
            - requestId
            - address
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "U123456789"
            address:
              type: string
              description: 삭제할 계정 주소
              pattern: "^0x[a-fA-F0-9]{40}$"
              examples:
                - "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
        examples:
          - name: 계정 삭제 요청 예시
            payload:
              requestId: "U123456789"
              address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"

  withdrawRequest:
    address: adapter.withdraw.request
    title: 출금 요청
    description: Core → Adapter
    messages:
      WithdrawRequest:
        name: WithdrawRequest
        title: 출금 요청
        payload:
          type: object
          required:
            - requestId
            - chainId
            - toAddress
            - amount
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "WD-20260325-000001"
            chainId:
              type: string
              description: 체인 ID
              examples:
                - "11155111"
            toAddress:
              type: string
              description: 수신 주소
              pattern: "^0x[a-fA-F0-9]{40}$"
              examples:
                - "0xAb5801a7D398351b8bE11C439e05C5b3259aeC9B"
            amount:
              type: string
              description: 출금 금액 (Wei 단위 decimal string)
              pattern: "^\\d+(\\.\\d+)?$"
              examples:
                - "100000000000000000"
            symbol:
              type: string
              description: 토큰 심볼 (null이면 네이티브 토큰)
              nullable: true
              examples:
                - "USDC"
                - null
        examples:
          - name: ERC-20 토큰 출금
            payload:
              requestId: "WD-20260325-000001"
              chainId: "11155111"
              toAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aeC9B"
              amount: "100000000000000000"
              symbol: "USDC"
          - name: 네이티브 코인 출금
            payload:
              requestId: "WD-20260325-000002"
              chainId: "11155111"
              toAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aeC9B"
              amount: "500000000000000000"
              symbol: null

  withdrawResult:
    address: adapter.withdraw.result
    title: 출금 결과
    description: Adapter → Core
    messages:
      WithdrawResponse:
        name: WithdrawResponse
        title: 출금 결과
        payload:
          type: object
          required:
            - requestId
            - status
            - txHash
            - completeDatetime
            - amount
            - gasFee
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "WD-20260325-000001"
            status:
              $ref: "#/components/schemas/TransactionStatus"
            txHash:
              type: string
              description: 트랜잭션 해시
              pattern: "^0x[a-fA-F0-9]{64}$"
              examples:
                - "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            completeDatetime:
              type: string
              description: 완료 일시 (yyyyMMddHHmmss)
              examples:
                - "20260325173715"
            amount:
              type: string
              description: 출금 금액 (decimal string)
              examples:
                - "100000000000000000"
            gasFee:
              type: string
              description: "가스 수수료 (gasFee = gasUsed * effectiveGasPrice)"
              examples:
                - "21000"
            message:
              type: string
              description: 에러 메시지 (성공 시 null)
              nullable: true
              examples:
                - null
        examples:
          - name: 출금 성공 (Confirmed)
            payload:
              requestId: "WD-20260325-000001"
              status: "TXCF"
              txHash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
              completeDatetime: "20260325173715"
              amount: "100000000000000000"
              gasFee: "21000"
              message: null
          - name: 출금 실패
            payload:
              requestId: "WD-20260325-000001"
              status: "TXFA"
              txHash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
              completeDatetime: "20260325173715"
              amount: "100000000000000000"
              gasFee: "21000"
              message: "INSUFFICIENT_BALANCE"

  paymentRequest:
    address: adapter.payment.request
    title: 결제 요청
    description: Core → Adapter
    messages:
      PaymentRequest:
        name: PaymentRequest
        title: 결제 요청
        payload:
          type: object
          required:
            - requestId
            - amount
            - symbol
          properties:
            requestId:
              type: string
              description: 결제 고유 ID
              examples:
                - "2026032501"
            amount:
              type: string
              description: 결제 금액 (decimal string)
              pattern: "^\\d+(\\.\\d+)?$"
              examples:
                - "7.69"
            symbol:
              type: string
              description: "토큰 심볼 (USDC, USDT, ETH, AVAX 등)"
              examples:
                - "USDC"
        examples:
          - name: USDC 결제 요청
            payload:
              requestId: "2026032501"
              amount: "7.69"
              symbol: "USDC"

  paymentResult:
    address: adapter.payment.result
    title: 결제 결과
    description: Adapter → Core
    messages:
      PaymentResponse:
        name: PaymentResponse
        title: 결제 결과
        payload:
          type: object
          required:
            - requestId
            - status
          properties:
            requestId:
              type: string
              description: 결제 고유 ID
              examples:
                - "2026032501"
            chainId:
              type: string
              description: 체인 ID
              nullable: true
              examples:
                - "56357"
            status:
              $ref: "#/components/schemas/TransactionStatus"
            txHash:
              type: string
              description: 트랜잭션 해시 (실패 시 null)
              pattern: "^0x[a-fA-F0-9]{64}$"
              nullable: true
              examples:
                - "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
            completeDatetime:
              type: string
              description: 완료 일시 (yyyyMMddHHmmss, 실패 시 null)
              nullable: true
              examples:
                - "20260325191630"
            amount:
              type: string
              description: 결제 금액 (실패 시 null)
              nullable: true
              examples:
                - "7.69"
            gasFee:
              type: string
              description: "가스 수수료 (gasFee = gasUsed * effectiveGasPrice, 실패 시 null)"
              nullable: true
              examples:
                - "21000"
            message:
              type: string
              description: 에러 메시지 (성공 시 null)
              nullable: true
              examples:
                - null
        examples:
          - name: 결제 성공
            payload:
              requestId: "2026032501"
              chainId: "56357"
              status: "TXCF"
              txHash: "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
              completeDatetime: "20260325191630"
              amount: "7.69"
              gasFee: "21000"
              message: null
          - name: 결제 실패
            payload:
              requestId: "2026032501"
              chainId: null
              status: "TXFA"
              txHash: null
              completeDatetime: null
              amount: null
              gasFee: null
              message: "BUSINESS_ERROR"

  commonConfirm:
    address: adapter.common.confirm
    title: 트랜잭션 컨펌 요청
    description: Core → Adapter
    messages:
      ConfirmRequest:
        name: ConfirmRequest
        title: 트랜잭션 컨펌 요청
        payload:
          type: object
          required:
            - requestId
            - txHash
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "W123456789"
            txHash:
              type: string
              description: 확인할 트랜잭션 해시
              pattern: "^0x[a-fA-F0-9]{64}$"
              examples:
                - "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            chainId:
              type: string
              description: 체인 ID (결제 컨펌 확인 시 null)
              nullable: true
              examples:
                - "11155111"
        examples:
          - name: 출금 컨펌 확인
            payload:
              requestId: "W123456789"
              txHash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
              chainId: "11155111"
          - name: 결제 컨펌 확인
            payload:
              requestId: "W123456789"
              txHash: "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
              chainId: null

  commonConfirmed:
    address: adapter.common.confirmed
    title: 트랜잭션 컨펌 결과
    description: Adapter → Core
    messages:
      ConfirmResponse:
        name: ConfirmResponse
        title: 트랜잭션 컨펌 결과
        payload:
          type: object
          required:
            - requestId
            - txHash
            - status
            - confirmCount
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "W123456789"
            txHash:
              type: string
              description: 트랜잭션 해시
              pattern: "^0x[a-fA-F0-9]{64}$"
              examples:
                - "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            status:
              $ref: "#/components/schemas/TransactionStatus"
            chainId:
              type: string
              description: 체인 ID
              nullable: true
              examples:
                - "11155111"
            confirmCount:
              type: integer
              description: 현재 블록 컨펌 수
              examples:
                - 7
            gasFee:
              type: string
              description: 가스 수수료 (실패 시 null)
              nullable: true
              examples:
                - "0.0001"
        examples:
          - name: 컨펌 완료
            payload:
              requestId: "W123456789"
              txHash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
              status: "TXCF"
              chainId: "11155111"
              confirmCount: 7
              gasFee: "0.0001"
          - name: 컨펌 대기 중
            payload:
              requestId: "W123456789"
              txHash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
              status: "TXPD"
              chainId: "11155111"
              confirmCount: 2
              gasFee: null

  balanceInquiry:
    address: adapter.balance.inquiry
    title: 잔액 조회 요청
    description: Core → Adapter
    messages:
      BalanceRequest:
        name: BalanceRequest
        title: 잔액 조회 요청
        payload:
          type: object
          required:
            - requestId
            - address
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "B123456789"
            address:
              type: string
              description: 조회할 주소
              pattern: "^0x[a-fA-F0-9]{40}$"
              examples:
                - "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
        examples:
          - name: 잔액 조회 요청 예시
            payload:
              requestId: "B123456789"
              address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"

  balanceResult:
    address: adapter.balance.result
    title: 잔액 조회 결과
    description: Adapter → Core
    messages:
      BalanceResponse:
        name: BalanceResponse
        title: 잔액 조회 결과
        payload:
          type: object
          required:
            - requestId
            - result
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "B123456789"
            result:
              type: array
              description: 체인/토큰별 잔액 목록
              items:
                type: object
                required:
                  - chainId
                  - symbol
                  - address
                  - balance
                properties:
                  chainId:
                    type: string
                    description: 체인 ID
                    examples:
                      - "11155111"
                  symbol:
                    type: string
                    description: 토큰 심볼
                    examples:
                      - "USDC"
                  address:
                    type: string
                    description: 조회한 주소
                    pattern: "^0x[a-fA-F0-9]{40}$"
                    examples:
                      - "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
                  balance:
                    type: string
                    description: 잔액 (decimal string)
                    examples:
                      - "250.0"
            message:
              type: string
              description: 에러 메시지 (성공 시 null)
              nullable: true
              examples:
                - null
        examples:
          - name: 잔액 조회 성공
            payload:
              requestId: "B123456789"
              result:
                - chainId: "11155111"
                  symbol: "USDC"
                  address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
                  balance: "250.0"
                - chainId: "11155111"
                  symbol: "ETH"
                  address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
                  balance: "1.5"
              message: null
          - name: 잔액 조회 실패
            payload:
              requestId: "B123456789"
              result: []
              message: "ACCOUNT_NOT_FOUND"

  configCreate:
    address: adapter.config.create
    title: 설정 등록
    description: Core → Adapter (응답 없음)
    messages:
      ConfigRegisterRequest:
        name: ConfigRegisterRequest
        title: 설정 등록 요청 (NoReply)
        payload:
          type: object
          required:
            - requestId
            - chainId
            - contractAddress
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "C123456789"
            chainId:
              type: string
              description: 체인 ID
              examples:
                - "43114"
            contractAddress:
              type: string
              description: 토큰 컨트랙트 주소
              pattern: "^0x[a-fA-F0-9]{40}$"
              examples:
                - "0xB97EF9Ef8734C71904D8002F8b6Bc66Dd9c48a6E"
        examples:
          - name: 토큰 설정 등록
            payload:
              requestId: "C123456789"
              chainId: "43114"
              contractAddress: "0xB97EF9Ef8734C71904D8002F8b6Bc66Dd9c48a6E"

  settlementRequest:
    address: adapter.settlement.request
    title: 정산 요청
    description: Core → Adapter
    messages:
      SettlementRequest:
        name: SettlementRequest
        title: 정산 요청
        payload:
          type: object
          required:
            - requestId
            - symbol
            - amount
            - fee
            - merchantAddress
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "ST-20260407-000001"
            symbol:
              type: string
              description: 토큰 심볼 (1-20자)
              examples:
                - "USDC"
            amount:
              type: string
              description: 정산 금액 (decimal string)
              pattern: "^\\d+(\\.\\d+)?$"
              examples:
                - "100.00"
            fee:
              type: string
              description: 수수료 (decimal string)
              pattern: "^\\d+(\\.\\d+)?$"
              examples:
                - "1.50"
            merchantAddress:
              type: string
              description: 가맹점 주소
              pattern: "^0x[a-fA-F0-9]{40}$"
              examples:
                - "0xCBdAbfa3d691211f337e1f415D4Ee64979C7ee00"
        examples:
          - name: USDC 정산 요청
            payload:
              requestId: "ST-20260407-000001"
              symbol: "USDC"
              amount: "100.00"
              fee: "1.50"
              merchantAddress: "0xCBdAbfa3d691211f337e1f415D4Ee64979C7ee00"

  settlementResult:
    address: adapter.settlement.result
    title: 정산 결과
    description: Adapter → Core
    messages:
      SettlementResponse:
        name: SettlementResponse
        title: 정산 결과
        payload:
          type: object
          required:
            - requestId
            - chainId
            - status
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "ST-20260407-000001"
            chainId:
              type: string
              description: 체인 ID
              examples:
                - "56357"
            status:
              $ref: "#/components/schemas/TransactionStatus"
            txHash:
              type: string
              description: 트랜잭션 해시 (실패 시 null)
              pattern: "^0x[a-fA-F0-9]{64}$"
              nullable: true
              examples:
                - "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
            completeDatetime:
              type: string
              description: 완료 일시 (yyyyMMddHHmmss, 실패 시 null)
              nullable: true
              examples:
                - "20260407143015"
            amount:
              type: string
              description: 정산 금액 (실패 시 null)
              nullable: true
              examples:
                - "100.00"
            gasFee:
              type: string
              description: 가스 수수료 (실패 시 null)
              nullable: true
              examples:
                - "21000"
            message:
              type: string
              description: 에러 메시지 (성공 시 null)
              nullable: true
              examples:
                - null
        examples:
          - name: 정산 성공
            payload:
              requestId: "ST-20260407-000001"
              chainId: "56357"
              status: "TXCF"
              txHash: "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
              completeDatetime: "20260407143015"
              amount: "100.00"
              gasFee: "21000"
              message: null
          - name: 정산 실패
            payload:
              requestId: "ST-20260407-000001"
              chainId: "56357"
              status: "TXFA"
              txHash: null
              completeDatetime: null
              amount: null
              gasFee: null
              message: "INSUFFICIENT_BALANCE"

  reconciliationInquiry:
    address: adapter.reconciliation.inquiry
    title: 대사 조회 요청
    description: Core → Adapter
    messages:
      ReconciliationRequest:
        name: ReconciliationRequest
        title: 대사 조회 요청
        payload:
          type: object
          required:
            - requestId
            - targetDt
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "RC-20260407-000001"
            targetDt:
              type: string
              description: 대사 기준 일시 (yyyyMMddHHmmss)
              pattern: "^\\d{14}$"
              examples:
                - "20260407000000"
        examples:
          - name: 대사 조회 요청 예시
            payload:
              requestId: "RC-20260407-000001"
              targetDt: "20260407000000"

  reconciliationResult:
    address: adapter.reconciliation.result
    title: 대사 조회 결과
    description: Adapter → Core
    messages:
      ReconciliationResponse:
        name: ReconciliationResponse
        title: 대사 조회 결과
        payload:
          type: object
          required:
            - requestId
            - result
          properties:
            requestId:
              type: string
              description: 요청 고유 ID
              examples:
                - "RC-20260407-000001"
            result:
              type: array
              description: 토큰별 대사 결과 목록
              items:
                type: object
                required:
                  - symbol
                  - userOnTotal
                  - platformOnTotal
                  - reserveOnTotal
                  - notDeployUserOnTotal
                properties:
                  symbol:
                    type: string
                    description: 토큰 심볼
                    examples:
                      - "USDC"
                  userOnTotal:
                    type: string
                    description: 사용자 온체인 잔액 합계 (decimal string)
                    examples:
                      - "50000.00"
                  platformOnTotal:
                    type: string
                    description: 플랫폼 온체인 잔액 합계 (decimal string)
                    examples:
                      - "10000.00"
                  reserveOnTotal:
                    type: string
                    description: 리저브 온체인 잔액 합계 (decimal string)
                    examples:
                      - "0"
                  notDeployUserOnTotal:
                    type: string
                    description: 미배포 사용자 온체인 잔액 합계 (decimal string)
                    examples:
                      - "500.00"
            message:
              type: string
              description: 에러 메시지 (성공 시 null)
              nullable: true
              examples:
                - null
        examples:
          - name: 대사 조회 성공
            payload:
              requestId: "RC-20260407-000001"
              result:
                - symbol: "USDC"
                  userOnTotal: "50000.00"
                  platformOnTotal: "10000.00"
                  reserveOnTotal: "0"
                  notDeployUserOnTotal: "500.00"
                - symbol: "USDT"
                  userOnTotal: "30000.00"
                  platformOnTotal: "5000.00"
                  reserveOnTotal: "0"
                  notDeployUserOnTotal: "200.00"
              message: null
          - name: 대사 조회 실패
            payload:
              requestId: "RC-20260407-000001"
              result: []
              message: "VALIDATION_ERROR"

  depositDetected:
    address: adapter.deposit.detected
    title: 입금 감지 이벤트
    description: Adapter → Core (WebSocket 감지)
    messages:
      DepositEvent:
        name: DepositEvent
        title: 입금 감지 이벤트
        description: WebSocket에서 감지된 입금을 Kafka로 발행
        payload:
          type: object
          required:
            - chainId
            - txHash
            - fromAddress
            - toAddress
            - amount
            - confirmCount
            - symbol
            - status
            - transactionDatetime
          properties:
            chainId:
              type: string
              description: 체인 ID
              examples:
                - "11155111"
            txHash:
              type: string
              description: 트랜잭션 해시
              pattern: "^0x[a-fA-F0-9]{64}$"
              examples:
                - "0x7f9fade1c0d57a7af66ab4ead79fade1c0d57a7af66ab4ead7c2c2eb7b11a91385"
            fromAddress:
              type: string
              description: 송신 주소
              pattern: "^0x[a-fA-F0-9]{40}$"
              examples:
                - "0xAb5801a7D398351b8bE11C439e05C5b3259aeC9B"
            toAddress:
              type: string
              description: 수신 (입금) 주소
              pattern: "^0x[a-fA-F0-9]{40}$"
              examples:
                - "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
            amount:
              type: string
              description: 입금 금액 (Wei/decimal string)
              examples:
                - "10000000000"
            confirmCount:
              type: integer
              description: 현재 블록 컨펌 수
              examples:
                - 10
            symbol:
              type: string
              description: 토큰 심볼
              examples:
                - "USDT"
            status:
              type: string
              description: "트랜잭션 상태 (TXPD / TXCF / TXFA)"
              examples:
                - "TXCF"
            transactionDatetime:
              type: string
              description: 트랜잭션 일시 (yyyyMMddHHmmss)
              examples:
                - "20260325122100"
        examples:
          - name: USDT 입금 감지 (Confirmed)
            payload:
              chainId: "11155111"
              txHash: "0x7f9fade1c0d57a7af66ab4ead79fade1c0d57a7af66ab4ead7c2c2eb7b11a91385"
              fromAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aeC9B"
              toAddress: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
              amount: "10000000000"
              confirmCount: 10
              symbol: "USDT"
              status: "TXCF"
              transactionDatetime: "20260325122100"
          - name: 네이티브 코인 입금 감지 (Pending)
            payload:
              chainId: "11155111"
              txHash: "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
              fromAddress: "0xAb5801a7D398351b8bE11C439e05C5b3259aeC9B"
              toAddress: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
              amount: "500000000000000000"
              confirmCount: 1
              symbol: "ETH"
              status: "TXPD"
              transactionDatetime: "20260325122200"

