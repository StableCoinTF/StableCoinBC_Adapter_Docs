  accountCreated:
    $ref: './channels.yaml#/accountCreated'
  accountDeploy:
    $ref: './channels.yaml#/accountDeploy'
  accountDeployed:
    $ref: './channels.yaml#/accountDeployed'
  accountDelete:
    $ref: './channels.yaml#/accountDelete'
  withdrawRequest:
    $ref: './channels.yaml#/withdrawRequest'
  withdrawResult:
    $ref: './channels.yaml#/withdrawResult'
  paymentRequest:
    $ref: './channels.yaml#/paymentRequest'
  paymentResult:
    $ref: './channels.yaml#/paymentResult'
  commonConfirm:
    $ref: './channels.yaml#/commonConfirm'
  commonConfirmed:
    $ref: './channels.yaml#/commonConfirmed'

  configCreate:
    $ref: './channels.yaml#/configCreate'
  settlementRequest:
    $ref: './channels.yaml#/settlementRequest'
  settlementResult:
    $ref: './channels.yaml#/settlementResult'
  balanceInquiry:
    $ref: './channels.yaml#/balanceInquiry'
  balanceResult:
