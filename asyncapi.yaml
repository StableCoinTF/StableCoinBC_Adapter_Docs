components:
  schemas:
    TransactionStatus:
      title: 트랜잭션 상태
      type: string
      enum:
        - TXPD
        - TXCF
        - TXFA
      description: |
        트랜잭션 상태:
        - TXPD: Pending (제출됨, 컨펌 대기 중)
        - TXCF: Confirmed (블록 컨펌 완료)
        - TXFA: Failed (트랜잭션 실패)

# ═════════════════════════════════════════════════════════════
#   새 토픽 추가 가이드
# ═════════════════════════════════════════════════════════════
#
# [1단계] channels 섹션에 채널 + 메시지 인라인 추가:
#
#   newTopicRequest:
#     address: adapter.new.topic
#     description: 새 토픽 설명 (방향)
#     messages:
#       NewTopicRequest:
#         name: NewTopicRequest
#         title: 새 토픽 요청
#         payload:
#           type: object
#           required: [requestId, myField]
#           properties:
#             requestId:
#               type: string
#               description: 요청 고유 ID
#               examples: ["REQ-001"]
#             myField:
#               type: string
#               description: 필드 설명
#               examples: ["example-value"]
#         examples:
#           - name: 요청 예시
#             payload:
#               requestId: "REQ-001"
#               myField: "example-value"
#
# [2단계] operations 섹션에 추가:
#
#   receiveNewTopic:
#     action: receive            # receive = Inbound, send = Outbound
#     channel:
#       $ref: "#/channels/newTopicRequest"
#     summary: 새 토픽 요청 수신
#     reply:                     # 응답 없으면(NoReply) reply 블록 삭제
#       channel:
#         $ref: "#/channels/newTopicResult"
#
# [3단계] asyncapi.yaml 수정 후 main에 push → GitHub Actions 자동 배포
