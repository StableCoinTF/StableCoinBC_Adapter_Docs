operations:
  receiveAccountCreate:
    action: receive
    channel:
      $ref: "#/channels/accountCreate"
    title: 계정 생성 요청 수신
    summary: 계정 생성 요청 수신
    reply:
      channel:
        $ref: "#/channels/accountCreated"

  sendAccountCreated:
    action: send
    channel:
      $ref: "#/channels/accountCreated"
    title: 계정 생성 결과 발행
    summary: 계정 생성 결과 발행

  receiveAccountDeploy:
    action: receive
    channel:
      $ref: "#/channels/accountDeploy"
    title: 계정 배포 요청 수신
    summary: 계정 배포 요청 수신
    reply:
      channel:
        $ref: "#/channels/accountDeployed"

