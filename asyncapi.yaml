  reconciliationInquiry:
    $ref: './channels.yaml#/reconciliationInquiry'
  reconciliationResult:
    $ref: './channels.yaml#/reconciliationResult'
  submissionInquiry:
    $ref: './channels.yaml#/submissionInquiry'
  submissionResult:
