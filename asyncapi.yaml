    $ref: './channels.yaml#/monitorEntrypointTransfer'
  monitorEntrypointTransferResult:
    $ref: './channels.yaml#/monitorEntrypointTransferResult'
  monitorMetricInquiry:
    $ref: './channels.yaml#/monitorMetricInquiry'
  monitorMetricResult:
