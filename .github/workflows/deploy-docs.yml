name: Deploy AsyncAPI Docs

on:
  push:
    branches: [main]
    paths:
      - "asyncapi.yaml"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate HTML from AsyncAPI
        run: npx -y @asyncapi/generator asyncapi.yaml @asyncapi/html-template -o docs --force-write

      - name: Replace English to Korean
        run: |
          sed -i \
            -e 's/>receiveAccountCreate</>계정 생성 요청 수신</g' \
            -e 's/>sendAccountCreated</>계정 생성 결과 발행</g' \
            -e 's/>receiveAccountDeploy</>계정 배포 요청 수신</g' \
            -e 's/>sendAccountDeployed</>계정 배포 결과 발행</g' \
            -e 's/>receiveAccountDelete</>계정 삭제 요청 수신</g' \
            -e 's/>receiveWithdrawRequest</>출금 요청 수신</g' \
            -e 's/>sendWithdrawResult</>출금 결과 발행</g' \
            -e 's/>receivePaymentRequest</>결제 요청 수신</g' \
            -e 's/>sendPaymentResult</>결제 결과 발행</g' \
            -e 's/>receiveConfirm</>트랜잭션 컨펌 요청 수신</g' \
            -e 's/>sendConfirmed</>트랜잭션 컨펌 결과 발행</g' \
            -e 's/>receiveBalanceInquiry</>잔액 조회 요청 수신</g' \
            -e 's/>sendBalanceResult</>잔액 조회 결과 발행</g' \
            -e 's/>receiveConfigRegister</>토큰 설정 등록 요청 수신</g' \
            -e 's/>sendDepositDetected</>입금 감지 이벤트 발행</g' \
            -e 's/>TransactionStatus</>트랜잭션 상태</g' \
            -e 's|font-mono text-base">adapter.account.create<|font-mono text-base">계정 생성 요청 (adapter.account.create)<|g' \
            -e 's|font-mono text-base">adapter.account.created<|font-mono text-base">계정 생성 결과 (adapter.account.created)<|g' \
            -e 's|font-mono text-base">adapter.account.deploy<|font-mono text-base">계정 배포 요청 (adapter.account.deploy)<|g' \
            -e 's|font-mono text-base">adapter.account.deployed<|font-mono text-base">계정 배포 결과 (adapter.account.deployed)<|g' \
            -e 's|font-mono text-base">adapter.account.delete<|font-mono text-base">계정 삭제 요청 (adapter.account.delete)<|g' \
            -e 's|font-mono text-base">adapter.withdraw.request<|font-mono text-base">출금 요청 (adapter.withdraw.request)<|g' \
            -e 's|font-mono text-base">adapter.withdraw.result<|font-mono text-base">출금 결과 (adapter.withdraw.result)<|g' \
            -e 's|font-mono text-base">adapter.payment.request<|font-mono text-base">결제 요청 (adapter.payment.request)<|g' \
            -e 's|font-mono text-base">adapter.payment.result<|font-mono text-base">결제 결과 (adapter.payment.result)<|g' \
            -e 's|font-mono text-base">adapter.common.confirm<|font-mono text-base">트랜잭션 컨펌 요청 (adapter.common.confirm)<|g' \
            -e 's|font-mono text-base">adapter.common.confirmed<|font-mono text-base">트랜잭션 컨펌 결과 (adapter.common.confirmed)<|g' \
            -e 's|font-mono text-base">adapter.balance.inquiry<|font-mono text-base">잔액 조회 요청 (adapter.balance.inquiry)<|g' \
            -e 's|font-mono text-base">adapter.balance.result<|font-mono text-base">잔액 조회 결과 (adapter.balance.result)<|g' \
            -e 's|font-mono text-base">adapter.config.register<|font-mono text-base">토큰 설정 등록 (adapter.config.register)<|g' \
            -e 's|font-mono text-base">adapter.deposit.detected<|font-mono text-base">입금 감지 이벤트 (adapter.deposit.detected)<|g' \
            docs/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
