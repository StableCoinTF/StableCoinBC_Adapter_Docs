            examples:
              - "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
      examples:
        - name: 계정 삭제 요청 예시
          payload:
            request_id: "T123456789"
            address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"

withdrawRequest:
  address: adapter.withdraw.request
  title: 출금 요청
  description: Core → Adapter
  x-group: 거래
  x-icon: "📤"
  messages:
    WithdrawRequest:
      name: WithdrawRequest
      title: 출금 요청
      payload:
        type: object
        required:
          - request_id
          - chain_id
          - to_address
          - amount
        properties:
          request_id:
            type: string
            description: 요청 고유 ID
            examples:
              - "T123456789"
          chain_id:
            type: string
            description: 체인 ID
            examples:
              - "11155111"
          to_address:
            type: string
            description: 수신 주소
            pattern: "^0x[a-fA-F0-9]{40}$"
            examples:
              - "0xAb5801a7D398351b8bE11C439e05C5b3259aeC9B"
          amount:
            type: string
            description: 출금 금액 (Wei 단위 decimal string)
            pattern: "^\\d+(\\.\\d+)?$"
            examples:
              - "100000000000000000"
          symbol:
            type: string
            description: 토큰 심볼 (null이면 네이티브 토큰)
            nullable: true
            examples:
              - "USDC"
              - null
      examples:
        - name: ERC-20 토큰 출금
          payload:
            request_id: "T123456789"
            chain_id: "11155111"
            to_address: "0xAb5801a7D398351b8bE11C439e05C5b3259aeC9B"
            amount: "100000000000000000"
            symbol: "USDC"
        - name: 네이티브 코인 출금
          payload:
            request_id: "T123456789"
            chain_id: "11155111"
            to_address: "0xAb5801a7D398351b8bE11C439e05C5b3259aeC9B"
            amount: "500000000000000000"
            symbol: null

withdrawResult:
  address: adapter.withdraw.result
  title: 출금 결과
  description: Adapter → Core
  messages:
    WithdrawResponse:
      name: WithdrawResponse
      title: 출금 결과
      payload:
        type: object
        required:
          - request_id
          - status
          - tx_hash
          - complete_datetime
          - amount
          - gas_fee
        properties:
          request_id:
            type: string
            description: 요청 고유 ID
            examples:
              - "T123456789"
          status:
            $ref: "asyncapi.yaml#/components/schemas/TransactionStatus"
          tx_hash:
            type: string
            description: 트랜잭션 해시
            pattern: "^0x[a-fA-F0-9]{64}$"
            examples:
              - "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
          complete_datetime:
            type: string
            description: 완료 일시 (yyyyMMddHHmmss)
            examples:
              - "20260325173715"
          amount:
            type: string
            description: 출금 금액 (decimal string)
            examples:
              - "100000000000000000"
          gas_fee:
            type: string
            description: "가스 수수료 (gas_fee = gasUsed * effectiveGasPrice)"
            examples:
              - "21000"
          message:
            type: string
            description: 에러 메시지 (성공 시 null)
            nullable: true
            examples:
              - null
      examples:
        - name: 출금 성공 (Confirmed)
          payload:
            request_id: "T123456789"
            status: "TXCF"
            tx_hash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            complete_datetime: "20260325173715"
            amount: "100000000000000000"
            gas_fee: "21000"
            message: null
        - name: 출금 실패
          payload:
            request_id: "T123456789"
            status: "TXFA"
            tx_hash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            complete_datetime: "20260325173715"
            amount: "100000000000000000"
            gas_fee: "21000"
            message: "INSUFFICIENT_BALANCE"

