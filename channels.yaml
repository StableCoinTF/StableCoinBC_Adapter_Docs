  x-group: 거래
  x-icon: "✅"
  messages:
    ConfirmRequest:
      name: ConfirmRequest
      title: 트랜잭션 컨펌 요청
      payload:
        type: object
        required:
          - request_id
          - tx_hash
        properties:
          request_id:
            type: string
            description: 요청 고유 ID
            examples:
              - "T123456789"
          tx_hash:
            type: string
            description: 확인할 트랜잭션 해시
            pattern: "^0x[a-fA-F0-9]{64}$"
            examples:
              - "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
          chain_id:
            type: string
            description: 체인 ID (결제 컨펌 확인 시 null)
            nullable: true
            examples:
              - "11155111"
      examples:
        - name: 출금 컨펌 확인
          payload:
            request_id: "T123456789"
            tx_hash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            chain_id: "11155111"
        - name: 결제 컨펌 확인
          payload:
            request_id: "T123456789"
            tx_hash: "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
            chain_id: null

commonConfirmed:
  address: adapter.common.confirmed
  title: 트랜잭션 컨펌 결과
  description: Adapter → Core
  messages:
    ConfirmResponse:
      name: ConfirmResponse
      title: 트랜잭션 컨펌 결과
      payload:
        type: object
        required:
          - request_id
          - tx_hash
          - status
          - confirm_count
        properties:
          request_id:
            type: string
            description: 요청 고유 ID
            examples:
              - "T123456789"
          tx_hash:
            type: string
            description: 트랜잭션 해시
            pattern: "^0x[a-fA-F0-9]{64}$"
            examples:
              - "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
          status:
            $ref: "asyncapi.yaml#/components/schemas/TransactionStatus"
          chain_id:
            type: string
            description: 체인 ID
            nullable: true
            examples:
              - "11155111"
          confirm_count:
            type: integer
            description: 현재 블록 컨펌 수
            examples:
              - 7
          gas_fee:
            type: string
            description: 가스 수수료 (실패 시 null)
            nullable: true
            examples:
              - "0.0001"
      examples:
        - name: 컨펌 완료
          payload:
            request_id: "T123456789"
            tx_hash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            status: "TXCF"
            chain_id: "11155111"
            confirm_count: 7
            gas_fee: "0.0001"
        - name: 컨펌 대기 중
          payload:
            request_id: "T123456789"
            tx_hash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            status: "TXPD"
            chain_id: "11155111"
            confirm_count: 2
            gas_fee: null

