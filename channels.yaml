          chainId:
            type: string
            description: 체인 ID (결제 컨펌 확인 시 null)
            nullable: true
            examples:
              - "11155111"
      examples:
        - name: 출금 컨펌 확인
          payload:
            requestId: "W123456789"
            txHash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            chainId: "11155111"
        - name: 결제 컨펌 확인
          payload:
            requestId: "W123456789"
            txHash: "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
            chainId: null

commonConfirmed:
  address: adapter.common.confirmed
  title: 트랜잭션 컨펌 결과
  description: Adapter → Core
  messages:
    ConfirmResponse:
      name: ConfirmResponse
      title: 트랜잭션 컨펌 결과
      payload:
        type: object
        required:
          - requestId
          - txHash
          - status
          - confirmCount
        properties:
          requestId:
            type: string
            description: 요청 고유 ID
            examples:
              - "W123456789"
          txHash:
            type: string
            description: 트랜잭션 해시
            pattern: "^0x[a-fA-F0-9]{64}$"
            examples:
              - "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
          status:
            $ref: "asyncapi.yaml#/components/schemas/TransactionStatus"
          chainId:
            type: string
            description: 체인 ID
            nullable: true
            examples:
              - "11155111"
          confirmCount:
            type: integer
            description: 현재 블록 컨펌 수
            examples:
              - 7
          gasFee:
            type: string
            description: 가스 수수료 (실패 시 null)
            nullable: true
            examples:
              - "0.0001"
      examples:
        - name: 컨펌 완료
          payload:
            requestId: "W123456789"
            txHash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            status: "TXCF"
            chainId: "11155111"
            confirmCount: 7
            gasFee: "0.0001"
        - name: 컨펌 대기 중
          payload:
            requestId: "W123456789"
            txHash: "0xe9e91f1ee4b56c0df2e9f06c2b8c27c6076195a88a7b8537ba8313d80e6f124e"
            status: "TXPD"
            chainId: "11155111"
            confirmCount: 2
            gasFee: null

