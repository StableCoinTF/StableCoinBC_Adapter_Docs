accountCreate:
  address: adapter.account.create
  title: 계정 생성 요청
  description: Core → Adapter
  x-group: 계정 관리
  x-icon: "🆕"
  messages:
    AccountCreateRequest:
      name: AccountCreateRequest
      title: 계정 생성 요청
      payload:
        type: object
        required:
          - requestId
          - networkType
        properties:
          requestId:
            type: string
            description: 요청 고유 ID
            examples:
              - "U123456789"
          networkType:
            type: string
            description: "네트워크 타입 (예: EVM)"
            examples:
              - "EVM"
      examples:
        - name: 계정 생성 요청 예시
          payload:
            requestId: "U123456789"
            networkType: "EVM"

accountCreated:
  address: adapter.account.created
  title: 계정 생성 결과
  description: Adapter → Core
  messages:
    AccountCreateResponse:
      name: AccountCreateResponse
      title: 계정 생성 결과
      payload:
        type: object
        required:
          - requestId
          - address
          - networkType
        properties:
          requestId:
            type: string
            description: 요청 고유 ID
            examples:
              - "U123456789"
          address:
            type: string
            description: 생성된 Smart Account 주소 (실패 시 null)
            pattern: "^0x[a-fA-F0-9]{40}$"
            nullable: true
            examples:
              - "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
          networkType:
            type: string
            description: 네트워크 타입 (실패 시 null)
            nullable: true
            examples:
              - "EVM"
          message:
            type: string
            description: 에러 메시지 (성공 시 빈 문자열)
            nullable: true
            examples:
              - ""
      examples:
        - name: 계정 생성 성공
          payload:
            requestId: "U123456789"
            address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
            networkType: "EVM"
            message: ""
        - name: 계정 생성 실패
          payload:
            requestId: "U123456789"
            address: null
            networkType: null
            message: "UNSUPPORTED_NETWORK_TYPE"

accountDeploy:
  address: adapter.account.deploy
  title: 계정 배포 요청
  description: Core → Adapter
  x-group: 계정 관리
  x-icon: "🚀"
  messages:
    AccountDeployRequest:
      name: AccountDeployRequest
      title: 계정 배포 요청
      payload:
        type: object
        required:
          - requestId
          - chainId
          - address
        properties:
          requestId:
            type: string
            description: 요청 고유 ID
            examples:
              - "U123456789"
          chainId:
            type: string
            description: "체인 ID (예: 11155111 = Sepolia)"
            examples:
              - "11155111"
          address:
            type: string
            description: 배포할 Smart Account 주소
            pattern: "^0x[a-fA-F0-9]{40}$"
            examples:
              - "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
      examples:
        - name: 계정 배포 요청 예시
          payload:
            requestId: "U123456789"
            chainId: "11155111"
            address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"

accountDeployed:
  address: adapter.account.deployed
  title: 계정 배포 결과
  description: Adapter → Core
  messages:
    AccountDeployResponse:
      name: AccountDeployResponse
      title: 계정 배포 결과
      payload:
        type: object
        required:
          - requestId
          - status
          - txHash
          - completeDatetime
        properties:
          requestId:
            type: string
            description: 요청 고유 ID
            examples:
              - "U123456789"
          status:
            $ref: "asyncapi.yaml#/components/schemas/TransactionStatus"
          txHash:
            type: string
            description: 트랜잭션 해시 (Pending 시 null)
            pattern: "^0x[a-fA-F0-9]{64}$"
            nullable: true
            examples:
              - "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
          completeDatetime:
            type: string
            description: 완료 일시 (yyyyMMddHHmmss, Pending 시 null)
            nullable: true
            examples:
              - "20260325143015"
          message:
            type: string
            description: 에러 메시지 (성공 시 빈 문자열)
            nullable: true
            examples:
              - ""
      examples:
        - name: 배포 Pending
          payload:
            requestId: "U123456789"
            status: "TXPD"
            txHash: null
            completeDatetime: null
            message: ""
        - name: 배포 Confirmed
          payload:
            requestId: "U123456789"
            status: "TXCF"
            txHash: "0xabc123def4567890abcdef1234567890abcdef1234567890abcdef1234567890"
            completeDatetime: "20260325143015"
            message: ""

accountDelete:
