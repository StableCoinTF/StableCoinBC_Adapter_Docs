          - requestId
          - txHash
        properties:
          requestId:
            type: string
            description: 요청 고유 ID
            examples:
              - "W123456789"
          txHash:
            type: string
            description: 확인할 트랜잭션 해시
            pattern: "^0x[a-fA-F0-9]{64}$"
